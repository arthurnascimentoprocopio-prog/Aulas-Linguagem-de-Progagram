 <html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sistema Escolar Simples</title>
    </head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #054d8b, #00f2fe);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px     rgba(51, 66, 80, 0.2);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 20px;
        }

        label {
            font-size: 14px;
            color: #555;
            margin-top: 12px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
        }

        .cadastrar {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .cadastrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .resultado {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-left: 4px solid #007bff;
            border-radius: 6px;
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .resultado h2 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }
    </style>

    <body>

        <div class="container">
            <h1>EEB Dom Jaime de Barros Câmara</h1>
        
            <form>
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome">

                <label for="dataNasc">Data de Nascimento:</label>
                <input type="date" id="dataNasc">

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf">

                <label for="gmail">Gmail:</label>
                <input type="email" id="gmail">

                <button type="button" class="cadastrar" onclick="mostrarDados()">Cadastrar Aluno</button>
            </form>

            <div id="resultado" class="resultado"></div>
        </div>

        <script>
            function mostrarDados(){
                let nome = document.getElementById("nome").value;
                let dataNasc = document.getElementById("dataNasc").value;
                let cpf = document.getElementById("cpf").value;
                let gmail = document.getElementById("gmail").value;

                document.getElementById("resultado").innerHTML =
                "<h2>Dados informados:</h2>" +
                "Nome: " + nome + "<br>" +
                "Data de Nascimento: " + dataNasc + "<br>" +
                "CPF: " + cpf + "<br>" +
                "Gmail: " + gmail;

                document.getElementById("resultado").style.display = "block";
            }
        </script>

    </body>

    </html>
